<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<style>
    body { background: #050505; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .main-box { border: 3px solid #00d4ff; padding: 20px; border-radius: 20px; background: #111; width: 350px; }
    .screen { background: #000; border: 2px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
    .label { color: #ffd600; font-size: 12px; margin-bottom: 5px; }
    .val { color: #00ff88; font-size: 20px; font-weight: bold; }
    .layout-box { border: 2px dashed #555; padding: 10px; border-radius: 10px; }
    .comp { background: #222; margin: 5px; padding: 8px; border-left: 4px solid #ff7b00; font-size: 13px; }
</style>
</head>
<body>

<div class="main-box">
    <h2 style="text-align:center; color:#00d4ff;">COOLER SMART PANEL</h2>
    
    <div class="screen">
        <div class="label">वोल्टेज (Stabilized)</div>
        <div class="val">230V OK</div>
    </div>

    <div class="layout-box">
        <h4 style="text-align:center; color:#fff;">अंदरूनी लेआउट (Internal)</h4>
        <div class="comp">Top: V-Guard Servo Stabilizer (ऊपर)</div>
        <div class="comp">Mid: Remote Controller Board (बीच)</div>
        <div class="comp">Bottom: Terminal Block & Relay (नीचे)</div>
    </div>

    <div style="margin-top:20px; font-size:12px; color:#aaa;">
        * सभी कनेक्शन टर्मिनल ब्लॉक पर टाइट करें<br>
        * रबर ग्लैंड्स का उपयोग करना न भूलें
    </div>
</div>

</body>
</html>
